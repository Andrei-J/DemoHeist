<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>System Message</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .screen {
      text-align: center;
      opacity: 0;
      transform: scale(0.98);
      transition: opacity 1.5s ease, transform 1.5s ease;
    }

    .screen.show {
      opacity: 1;
      transform: scale(1);
    }

    .glitch {
      font-size: 28px;
      letter-spacing: 2px;
      animation: flicker 1.2s infinite alternate;
    }

    @keyframes flicker {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .sub {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="screen" id="screen">
    <div class="glitch">THANKS FOR THE DONATION.</div>
    <div class="sub">SYSTEM MESSAGE</div>
  </div>

  <script>
    // Simulate blank screen delay
    document.addEventListener("DOMContentLoaded", () => {
      const screen = document.getElementById("screen");

      // Start blank, then reveal
      setTimeout(() => {
        screen.classList.add("show");
      }, 2000);
    });
  </script>
</body>
</html>
